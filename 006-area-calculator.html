<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No.006 座標面積計算ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2230;
    --border: #2a3444;
    --accent: #00d4aa;
    --accent2: #0099cc;
    --warn: #ff6b35;
    --text: #e2e8f0;
    --muted: #6b7fa3;
    --grid: rgba(0,212,170,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .app-shell {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  /* ヘッダー */
  header {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    margin-bottom: 40px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
  }
  .badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: rgba(0,212,170,0.08);
    border: 1px solid rgba(0,212,170,0.3);
    padding: 3px 10px;
    letter-spacing: 2px;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .sub {
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
    font-family: 'Share Tech Mono', monospace;
  }

  /* メインレイアウト */
  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 700px) { .layout { grid-template-columns: 1fr; } }

  /* パネル */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .panel-header {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }
  .panel-body { padding: 16px; }

  /* 座標入力テーブル */
  .coord-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    margin-bottom: 12px;
  }
  .coord-table th {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 1px;
    padding: 6px 8px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .coord-table td {
    padding: 4px 4px;
    text-align: center;
    vertical-align: middle;
  }
  .row-num {
    color: var(--muted);
    font-size: 11px;
    width: 24px;
  }
  input.coord-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 6px 8px;
    text-align: right;
    outline: none;
    transition: border-color 0.15s;
    border-radius: 2px;
  }
  input.coord-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,212,170,0.12);
  }
  input.coord-input::placeholder { color: var(--muted); opacity: 0.5; }

  .btn-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  button {
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    border: none;
    border-radius: 2px;
    padding: 8px 14px;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #0d1117;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .btn-primary:hover { background: #00f0c0; }
  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger {
    background: transparent;
    border: 1px solid rgba(255,107,53,0.4);
    color: var(--warn);
    font-size: 11px;
    padding: 6px 10px;
  }
  .btn-danger:hover { background: rgba(255,107,53,0.1); }

  /* 一括入力 */
  .bulk-area {
    width: 100%;
    height: 160px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 10px;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }
  .bulk-area:focus { border-color: var(--accent); }
  .bulk-hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    line-height: 1.6;
  }

  /* 結果パネル（全幅） */
  .result-panel {
    grid-column: 1 / -1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  /* 面積表示 */
  .result-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1px;
    background: var(--border);
  }
  .result-cell {
    background: var(--surface);
    padding: 20px 24px;
    position: relative;
  }
  .result-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .result-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 28px;
    color: var(--accent);
    letter-spacing: -1px;
    line-height: 1;
  }
  .result-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 6px;
  }
  .cell-copy-btn {
    background: rgba(0,212,170,0.08);
    border: 1px solid rgba(0,212,170,0.25);
    color: var(--accent);
    font-size: 13px;
    padding: 3px 8px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1;
  }
  .cell-copy-btn:hover {
    background: rgba(0,212,170,0.2);
    border-color: var(--accent);
  }
  .result-value.large { font-size: 36px; }

  /* ガウス計算式テーブル */
  .gauss-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    margin-top: 4px;
  }
  .gauss-table th {
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 1px;
    padding: 6px 12px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .gauss-table th:first-child { text-align: center; }
  .gauss-table td {
    padding: 5px 12px;
    text-align: right;
    border-bottom: 1px solid rgba(42,52,68,0.5);
  }
  .gauss-table td:first-child { text-align: center; color: var(--muted); }
  .gauss-table tr:last-child td { border-bottom: none; }
  .gauss-table .total-row td {
    border-top: 1px solid var(--accent);
    color: var(--accent);
    font-weight: bold;
    padding-top: 8px;
  }
  .pos { color: #00d4aa; }
  .neg { color: #ff6b35; }

  /* プレビュー（SVG図） */
  #preview-svg {
    width: 100%;
    height: 220px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    display: block;
  }

  /* エラー・メッセージ */
  .msg {
    font-size: 12px;
    padding: 10px 14px;
    border-radius: 2px;
    margin-top: 8px;
  }
  .msg.error { background: rgba(255,107,53,0.1); border: 1px solid rgba(255,107,53,0.3); color: var(--warn); }
  .msg.info  { background: rgba(0,212,170,0.06); border: 1px solid rgba(0,212,170,0.2); color: var(--accent); }

  /* タブ */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
  .tab {
    padding: 9px 18px;
    font-size: 12px;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* 削除ボタン（行） */
  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 14px;
    padding: 2px 4px;
    cursor: pointer;
    transition: color 0.15s;
  }
  .del-btn:hover { color: var(--warn); }

  /* 空状態 */
  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 13px;
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }

  hr.divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 0;
  }

  .copy-btn {
    font-size: 11px;
    padding: 5px 10px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    border-radius: 2px;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div class="app-shell">

  <header>
    <div class="badge">No.006</div>
    <h1>座標面積計算ツール</h1>
    <div class="sub">Gauss's Area Formula　v1.0</div>
  </header>

  <div class="layout">

    <!-- 左：手動入力 -->
    <div class="panel">
      <div class="panel-header"><span class="dot"></span>座標入力（手動）</div>
      <div class="panel-body">
        <table class="coord-table">
          <thead>
            <tr>
              <th></th>
              <th>点名</th>
              <th>X（北）</th>
              <th>Y（東）</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="coord-tbody"></tbody>
        </table>
        <div class="btn-row">
          <button class="btn-secondary" onclick="addRow()">＋ 行追加</button>
          <button class="btn-primary" onclick="calculate()">　計　算　</button>
          <button class="btn-danger" onclick="clearAll()">全クリア</button>
        </div>
        <div id="manual-msg"></div>
      </div>
    </div>

    <!-- 右：一括入力 & プレビュー -->
    <div class="panel">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('bulk')">一括入力</div>
        <div class="tab" onclick="switchTab('preview')">図形プレビュー</div>
      </div>

      <div class="tab-content active panel-body" id="tab-bulk">
        <textarea class="bulk-area" id="bulk-input"
          placeholder="例）&#10;1  1000.000  500.000&#10;2  1000.000  600.000&#10;3  1100.000  600.000&#10;4  1100.000  500.000"></textarea>
        <p class="bulk-hint">
          フォーマット：<b>点名　X（北）　Y（東）</b><br>
          区切りは「タブ」または「スペース」。1行1点。<br>
          ExcelやCSVからそのまま貼り付けOK。
        </p>
        <div class="btn-row" style="margin-top:10px;">
          <button class="btn-primary" onclick="importBulk()">読み込む</button>
          <button class="btn-secondary" onclick="clearBulk()">クリア</button>
        </div>
        <div id="bulk-msg"></div>
      </div>

      <div class="tab-content panel-body" id="tab-preview">
        <svg id="preview-svg" viewBox="0 0 300 220"></svg>
        <div id="preview-msg" class="msg info" style="display:none;"></div>
      </div>
    </div>

    <!-- 結果（全幅） -->
    <div class="result-panel" id="result-section" style="display:none;">
      <div class="panel-header"><span class="dot"></span>計算結果</div>

      <div class="result-grid" id="result-grid"></div>

      <hr class="divider" style="margin:0;">

      <div class="tabs">
        <div class="tab active" onclick="switchResultTab('formula')">ガウス計算式</div>
        <div class="tab" onclick="switchResultTab('summary')">結果サマリー</div>
      </div>

      <div class="tab-content active panel-body" id="rtab-formula">
        <table class="gauss-table" id="gauss-table"></table>
      </div>
      <div class="tab-content panel-body" id="rtab-summary">
        <pre id="summary-text" style="font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text);line-height:1.8;"></pre>
        <div style="margin-top:12px;">
          <button class="copy-btn" onclick="copySummary()">📋 コピー</button>
        </div>
      </div>
    </div>

  </div><!-- /layout -->
</div><!-- /app-shell -->

<script>
// =============================================
// 状態管理
// =============================================
let rows = [];  // { id, name, x, y }
let idCounter = 0;
let lastResult = null;

// =============================================
// 初期化：デフォルト4行
// =============================================
function init() {
  for (let i = 0; i < 4; i++) addRow(false);
  renderTable();
}

function addRow(doRender = true) {
  idCounter++;
  rows.push({ id: idCounter, name: String(rows.length + 1), x: '', y: '' });
  if (doRender) renderTable();
}

function removeRow(id) {
  rows = rows.filter(r => r.id !== id);
  // 点名を連番に振り直す（空でないもの以外）
  rows.forEach((r, i) => { if (!isNaN(r.name) || r.name === '') r.name = String(i + 1); });
  renderTable();
}

function clearAll() {
  rows = [];
  idCounter = 0;
  for (let i = 0; i < 4; i++) addRow(false);
  renderTable();
  hideResult();
  document.getElementById('manual-msg').innerHTML = '';
}

// =============================================
// テーブル描画
// =============================================
function renderTable() {
  const tbody = document.getElementById('coord-tbody');
  tbody.innerHTML = '';
  rows.forEach((r, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="row-num">${i + 1}</td>
      <td><input class="coord-input" style="width:56px;text-align:left;"
          value="${esc(r.name)}" placeholder="P${i+1}"
          oninput="updateRow(${r.id},'name',this.value)"></td>
      <td><input class="coord-input" type="number" step="any"
          value="${r.x}" placeholder="0.000"
          oninput="updateRow(${r.id},'x',this.value)"></td>
      <td><input class="coord-input" type="number" step="any"
          value="${r.y}" placeholder="0.000"
          oninput="updateRow(${r.id},'y',this.value)"></td>
      <td><button class="del-btn" onclick="removeRow(${r.id})">✕</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function updateRow(id, field, value) {
  const r = rows.find(r => r.id === id);
  if (r) r[field] = value;
}

function esc(s) { return String(s).replace(/"/g, '&quot;'); }

// =============================================
// 一括入力
// =============================================
function importBulk() {
  const text = document.getElementById('bulk-input').value.trim();
  if (!text) { showMsg('bulk-msg', 'error', '入力が空です。'); return; }

  const lines = text.split('\n').filter(l => l.trim());
  const newRows = [];
  let errLine = -1;

  for (let i = 0; i < lines.length; i++) {
    const parts = lines[i].trim().split(/[\s,\t]+/);
    if (parts.length < 3) { errLine = i + 1; break; }
    const [name, x, y] = parts;
    if (isNaN(parseFloat(x)) || isNaN(parseFloat(y))) { errLine = i + 1; break; }
    idCounter++;
    newRows.push({ id: idCounter, name, x: parseFloat(x), y: parseFloat(y) });
  }

  if (errLine > 0) {
    showMsg('bulk-msg', 'error', `${errLine}行目の形式が正しくありません。「点名 X Y」の順で入力してください。`);
    return;
  }
  if (newRows.length < 3) {
    showMsg('bulk-msg', 'error', '面積計算には3点以上必要です。');
    return;
  }

  rows = newRows;
  renderTable();
  showMsg('bulk-msg', 'info', `${rows.length}点を読み込みました。「計算」を押してください。`);
}

function clearBulk() {
  document.getElementById('bulk-input').value = '';
  document.getElementById('bulk-msg').innerHTML = '';
}

// =============================================
// ガウスの面積公式
// =============================================
function calculate() {
  document.getElementById('manual-msg').innerHTML = '';

  // 有効点を抽出
  const pts = rows
    .filter(r => r.x !== '' && r.y !== '' && !isNaN(parseFloat(r.x)) && !isNaN(parseFloat(r.y)))
    .map(r => ({ name: r.name, x: parseFloat(r.x), y: parseFloat(r.y) }));

  if (pts.length < 3) {
    showMsg('manual-msg', 'error', '面積計算には3点以上のXY座標が必要です。');
    hideResult();
    return;
  }

  // ガウスの面積公式（座標法）
  // 2S = Σ(Xi * Yi+1 - Xi+1 * Yi)
  const n = pts.length;
  let sum = 0;
  const terms = [];

  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    const forward = pts[i].x * pts[j].y;
    const backward = pts[j].x * pts[i].y;
    const diff = forward - backward;
    sum += diff;
    terms.push({
      i: pts[i].name,
      j: pts[j].name,
      xi: pts[i].x, yi: pts[i].y,
      xj: pts[j].x, yj: pts[j].y,
      forward, backward, diff
    });
  }

  const area_m2 = Math.abs(sum) / 2;
  const area_tsubo = area_m2 / 3.305785;
  const area_hect = area_m2 / 10000;
  const area_a = area_m2 / 100;

  lastResult = { pts, terms, sum, area_m2, area_tsubo, area_hect, area_a };

  showResultGrid(lastResult);
  showGaussTable(lastResult);
  updateSummary(lastResult);
  drawPreview(pts);
  showResult();
}

// =============================================
// 結果グリッド
// =============================================
function showResultGrid({ area_m2, area_tsubo, area_hect, area_a }) {
  const g = document.getElementById('result-grid');
  const fmt = (v, d) => {
    const [int, dec] = v.toFixed(d).split('.');
    const intFmt = int.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    return dec !== undefined ? intFmt + '.' + dec : intFmt;
  };
  // コピー用は数値のみ（カンマなし）
  const raw = (v, d) => v.toFixed(d);

  const cell = (label, unit, dispVal, rawVal, btnId) => `
    <div class="result-cell">
      <div class="result-label">${label}</div>
      <div class="result-value${label.includes('㎡') ? ' large' : ''}">${dispVal}</div>
      <div class="result-footer">
        <span class="result-unit">${unit}</span>
        <button class="cell-copy-btn" id="${btnId}" onclick="copyValue('${rawVal}','${btnId}')">📋</button>
      </div>
    </div>
  `;

  g.innerHTML =
    cell('面積（㎡）', '平方メートル', fmt(area_m2, 4),    raw(area_m2, 4),    'cp-m2')  +
    cell('坪',        '坪（≒3.305785㎡）', fmt(area_tsubo, 4), raw(area_tsubo, 4), 'cp-tsubo') +
    cell('ヘクタール', 'ha（=10,000㎡）',  fmt(area_hect, 6), raw(area_hect, 6),  'cp-hect') +
    cell('アール',    'a（=100㎡）',       fmt(area_a, 4),    raw(area_a, 4),     'cp-a');
}

function copyValue(val, btnId) {
  navigator.clipboard.writeText(val).then(() => {
    const btn = document.getElementById(btnId);
    btn.textContent = '✅';
    setTimeout(() => btn.textContent = '📋', 2000);
  });
}

// =============================================
// ガウス計算式テーブル
// =============================================
function showGaussTable({ terms, sum, area_m2 }) {
  const t = document.getElementById('gauss-table');
  const fmtN = (v, d=4) => {
    const [int, dec] = v.toFixed(d).split('.');
    const intFmt = int.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    return dec !== undefined ? intFmt + '.' + dec : intFmt;
  };
  const fmt = v => {
    const abs = Math.abs(v);
    return (v >= 0 ? '' : '−') + fmtN(abs, 4);
  };

  let html = `
    <thead>
      <tr>
        <th>辺</th>
        <th>Xi</th>
        <th>Yj</th>
        <th>Xi×Yj (順)</th>
        <th>Xj</th>
        <th>Yi</th>
        <th>Xj×Yi (逆)</th>
        <th>差</th>
      </tr>
    </thead>
    <tbody>
  `;
  let totalForward = 0, totalBackward = 0;
  terms.forEach(t => {
    const cls = t.diff >= 0 ? 'pos' : 'neg';
    totalForward += t.forward;
    totalBackward += t.backward;
    html += `
      <tr>
        <td>${t.i}→${t.j}</td>
        <td>${fmtN(t.xi)}</td>
        <td>${fmtN(t.yj)}</td>
        <td class="pos">${fmtN(t.forward)}</td>
        <td>${fmtN(t.xj)}</td>
        <td>${fmtN(t.yi)}</td>
        <td class="neg">${fmtN(t.backward)}</td>
        <td class="${cls}">${fmt(t.diff)}</td>
      </tr>
    `;
  });
  html += `
      <tr class="total-row">
        <td colspan="3">合　計</td>
        <td>${fmtN(totalForward)}</td>
        <td></td>
        <td></td>
        <td>${fmtN(totalBackward)}</td>
        <td>${fmt(sum)}</td>
      </tr>
      <tr class="total-row">
        <td colspan="7">2S = |${fmt(sum)}|　→　S = <b>${fmtN(area_m2, 4)} ㎡</b></td>
        <td></td>
      </tr>
    </tbody>
  `;
  t.innerHTML = html;
}

// =============================================
// サマリーテキスト
// =============================================
function updateSummary({ pts, area_m2, area_tsubo, area_hect, area_a }) {
  const fmtN = (v, d=4) => {
    const [int, dec] = v.toFixed(d).split('.');
    const intFmt = int.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    return dec !== undefined ? intFmt + '.' + dec : intFmt;
  };
  let lines = ['＝＝ 座標面積計算結果 ＝＝', ''];
  lines.push('【入力座標】');
  pts.forEach(p => lines.push(`  ${p.name}  X=${fmtN(p.x)} Y=${fmtN(p.y)}`));
  lines.push('');
  lines.push('【面積】');
  lines.push(`  ${fmtN(area_m2, 4)} ㎡`);
  lines.push(`  ${fmtN(area_tsubo, 4)} 坪`);
  lines.push(`  ${fmtN(area_hect, 6)} ha`);
  lines.push(`  ${fmtN(area_a, 4)} a`);
  lines.push('');
  lines.push('（ガウスの面積公式・座標法による計算）');
  document.getElementById('summary-text').textContent = lines.join('\n');
}

function copySummary() {
  const txt = document.getElementById('summary-text').textContent;
  navigator.clipboard.writeText(txt).then(() => {
    const btn = event.target;
    btn.textContent = '✅ コピー完了';
    setTimeout(() => btn.textContent = '📋 コピー', 2000);
  });
}

// =============================================
// SVGプレビュー
// =============================================
function drawPreview(pts) {
  const svg = document.getElementById('preview-svg');
  const W = 300, H = 220, pad = 30;

  if (!pts.length) { svg.innerHTML = ''; return; }

  const xs = pts.map(p => p.x), ys = pts.map(p => p.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const rx = maxX - minX || 1, ry = maxY - minY || 1;
  const scale = Math.min((W - pad * 2) / rx, (H - pad * 2) / ry);

  // 測量座標系 X=北（上）Y=東（右）→ SVG座標変換
  // svgX = (Y - minY) * scale + pad
  // svgY = (maxX - X) * scale + pad
  const tx = p => (p.y - minY) * scale + pad;
  const ty = p => (maxX - p.x) * scale + pad;

  const poly = pts.map(p => `${tx(p).toFixed(1)},${ty(p).toFixed(1)}`).join(' ');

  let html = `
    <polygon points="${poly}"
      fill="rgba(0,212,170,0.08)" stroke="rgba(0,212,170,0.7)" stroke-width="1.5"/>
  `;
  // 点・ラベル
  pts.forEach((p, i) => {
    const sx = tx(p), sy = ty(p);
    html += `<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="3"
      fill="var(--accent)" opacity="0.9"/>`;
    // ラベル位置（端に寄らないよう調整）
    const lx = sx + (sx > W / 2 ? -6 : 6);
    const ly = sy + (sy > H / 2 ? -6 : 14);
    html += `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}"
      font-family="'Share Tech Mono',monospace" font-size="9"
      fill="rgba(0,212,170,0.8)">${p.name}</text>`;
  });
  // 軸ラベル
  html += `
    <text x="${W/2}" y="${H-4}" font-family="'Share Tech Mono',monospace"
      font-size="8" fill="rgba(107,127,163,0.7)" text-anchor="middle">Y（東）→</text>
    <text x="8" y="${H/2}" font-family="'Share Tech Mono',monospace"
      font-size="8" fill="rgba(107,127,163,0.7)" text-anchor="middle"
      transform="rotate(-90,8,${H/2})">X（北）↑</text>
  `;
  svg.innerHTML = html;

  // プレビュータブにメッセージ
  const msg = document.getElementById('preview-msg');
  msg.style.display = 'block';
  msg.textContent = `${pts.length}点の閉合図形を表示しています。`;
}

// =============================================
// タブ切り替え
// =============================================
function switchTab(name) {
  document.querySelectorAll('.tabs:first-of-type .tab').forEach((t, i) => {
    const ids = ['tab-bulk', 'tab-preview'];
    t.classList.toggle('active', ['bulk','preview'][i] === name);
  });
  // より確実な方法
  document.querySelectorAll('[id^="tab-"]').forEach(el => {
    el.classList.toggle('active', el.id === 'tab-' + name);
  });
  document.querySelectorAll('.panel:nth-child(2) .tab').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick').includes("'" + name + "'"));
  });
}

function switchResultTab(name) {
  document.querySelectorAll('#result-section .tab').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick').includes("'" + name + "'"));
  });
  document.querySelectorAll('[id^="rtab-"]').forEach(el => {
    el.classList.toggle('active', el.id === 'rtab-' + name);
  });
}

// =============================================
// ユーティリティ
// =============================================
function showMsg(id, type, text) {
  document.getElementById(id).innerHTML =
    `<div class="msg ${type}">${text}</div>`;
}
function showResult() { document.getElementById('result-section').style.display = ''; }
function hideResult() { document.getElementById('result-section').style.display = 'none'; }

// =============================================
// 起動
// =============================================
init();
</script>
